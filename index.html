<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SOCOETRAP Wallet</title>

<meta name="theme-color" content="#0A84FF">

<meta name="description"
content="SOCOETRAP Wallet - Pi Network Testnet">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="assets/icon-192.png">

<link rel="apple-touch-icon"
href="assets/icon-192.png">

<link rel="stylesheet"
href="wallet.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- SDK officiel Pi Network -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<header class="header">

<div class="logo">

<img
src="assets/icon-192.png"
alt="SOCOETRAP Wallet"
class="logo-img">

<div>

<h1>SOCOETRAP Wallet</h1>

<p>Pi Network Testnet</p>

</div>

</div>

<button id="piLoginBtn"
class="login-btn">

Connexion Pi

</button>

<main class="container">
  <section class="balance-card">

<h3>Solde Pi</h3>

<h1 id="balance">0.000000 π</h1>

<p id="lastUpdate">
Dernière mise à jour : --
</p>

<button id="refreshBtn" class="primary-btn">
Actualiser
</button>

</section>

<section class="actions">

<button id="sendBtn" class="action-btn">
📤
<span>Envoyer</span>
</button>

<button id="receiveBtn" class="action-btn">
📥
<span>Recevoir</span>
</button>

<button id="buyBtn" class="action-btn">
💳
<span>Acheter</span>
</button>

<button id="sellBtn" class="action-btn">
💵
<span>Vendre</span>
</button>

<button id="swapBtn" class="action-btn">
🔄
<span>Swap</span>
</button>

</section>

<section class="payment-section">

<h2>Paiement Pi Testnet</h2>

<input
type="number"
id="paymentAmount"
placeholder="Montant en Pi">

<input
type="text"
id="paymentMemo"
placeholder="Description">

<button
id="payBtn"
class="primary-btn">

Payer avec Pi

</button>

</section>

<section class="market-section">

<h2>Pi Network</h2>

<div id="marketList">

<div class="coin">

<div class="coin-left">

<img
src="assets/icon-192.png"
alt="Pi">

<div>

<div class="coin-name">

Pi Network

</div>

<div class="coin-symbol">

PI

</div>

</div>

</div>

<div style="text-align:right">

<div class="coin-price">

Chargement...

</div>

</div>

</div>

</div>

</section>

<section class="chart-section">

<canvas
id="priceChart"
height="260">

</canvas>

</section>

</main>
<footer class="bottom-nav">

<button>
🏠
<br>
Accueil
</button>

<button>
📊
<br>
Marché
</button>

<button>
💼
<br>
Wallet
</button>

<button>
⚙️
<br>
Paramètres
</button>

</footer>

<script src="wallet.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker
.register("./service-worker.js")
.then(() => {
console.log("Service Worker installé");
})
.catch((err) => {
console.log("Erreur Service Worker :", err);
});

});

}

// Initialisation du SDK Pi (Testnet)
Pi.init({
  version: "2.0",
  sandbox: true
});

</script>

</body>

</html>
